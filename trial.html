<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRODDEC Forum</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* ===== GLOBAL ===== */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins', sans-serif;
}

html{
  scroll-behavior:smooth;
}

body{
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
  overflow-x:hidden;
}

/* ===== NAVBAR ===== */
.navbar{
  position:fixed;
  width:100%;
  top:0;
  left:0;
  padding:20px 50px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  backdrop-filter:blur(12px);
  background:rgba(0,0,0,0.4);
  z-index:1000;
  transition:0.3s ease;
}

.navbar.scrolled{
  padding:12px 50px;
  background:rgba(0,0,0,0.7);
}

.logo{
  font-weight:600;
  font-size:22px;
  letter-spacing:1px;
}

.nav-links{
  display:flex;
  gap:30px;
}

.nav-links a{
  text-decoration:none;
  color:white;
  position:relative;
}

.nav-links a::after{
  content:"";
  position:absolute;
  bottom:-5px;
  left:0;
  width:0%;
  height:2px;
  background:#00e0ff;
  transition:0.3s;
}

.nav-links a:hover::after{
  width:100%;
}

/* ===== HERO ===== */
.hero{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
  padding:0 20px;
}

.hero h1{
  font-size:48px;
  margin-bottom:20px;
  animation:fadeDown 1s ease forwards;
}

.hero p{
  max-width:600px;
  opacity:0.8;
  margin-bottom:30px;
  animation:fadeUp 1.5s ease forwards;
}

.hero button{
  padding:12px 30px;
  border:none;
  border-radius:30px;
  background:#00e0ff;
  color:black;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

.hero button:hover{
  transform:scale(1.05);
}

/* ===== FORUM SECTION ===== */
.section{
  padding:120px 50px;
  max-width:1100px;
  margin:auto;
}

.controls{
  display:flex;
  gap:15px;
  margin-bottom:30px;
  flex-wrap:wrap;
}

.controls input,
.controls select{
  padding:12px;
  border-radius:8px;
  border:none;
  flex:1;
  min-width:200px;
}

.thread{
  background:rgba(255,255,255,0.08);
  padding:20px;
  border-radius:15px;
  margin-bottom:20px;
  backdrop-filter:blur(10px);
  transition:0.4s;
  transform:translateY(40px);
  opacity:0;
}

.thread.show{
  transform:translateY(0);
  opacity:1;
}

.thread:hover{
  transform:translateY(-5px) scale(1.01);
  background:rgba(255,255,255,0.15);
}

.thread h3{
  margin-bottom:10px;
  color:#00e0ff;
}

.meta{
  font-size:14px;
  opacity:0.7;
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
}

/* ===== ANIMATIONS ===== */
@keyframes fadeDown{
  from{opacity:0; transform:translateY(-30px);}
  to{opacity:1; transform:translateY(0);}
}

@keyframes fadeUp{
  from{opacity:0; transform:translateY(30px);}
  to{opacity:1; transform:translateY(0);}
}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
  .navbar{
    padding:15px 20px;
  }
  .section{
    padding:100px 20px;
  }
  .hero h1{
    font-size:32px;
  }
}

</style>
</head>
<body>

<!-- NAVBAR -->
<div class="navbar" id="navbar">
  <div class="logo">PRODDEC Forum</div>
  <div class="nav-links">
    <a href="#home">Home</a>
    <a href="#forum">Forum</a>
    <a href="#">Login</a>
  </div>
</div>

<!-- HERO -->
<section class="hero" id="home">
  <h1>Welcome to PRODDEC Community</h1>
  <p>Collaborate. Discuss. Innovate. Join conversations, share ideas and grow together.</p>
  <button onclick="document.getElementById('forum').scrollIntoView()">Explore Threads</button>
</section>

<!-- FORUM -->
<section class="section" id="forum">

  <div class="controls">
    <input type="text" id="searchInput" placeholder="Search discussions...">
    <select id="categoryFilter">
      <option value="All">All Categories</option>
      <option value="Tech">Tech</option>
      <option value="Events">Events</option>
      <option value="Career">Career</option>
      <option value="General">General</option>
    </select>
  </div>

  <div id="threadContainer"></div>

</section>

<script>

/* ===== SAMPLE DATA ===== */
let threads = [
  {title:"AI Innovation Meet", content:"Discuss latest AI trends and implementations.", author:"Akarsh", category:"Tech"},
  {title:"Hackathon 2026 Planning", content:"Share ideas for upcoming PRODDEC Hackathon.", author:"Rahul", category:"Events"},
  {title:"Internship Updates", content:"Latest internships shared by members.", author:"Sneha", category:"Career"},
  {title:"Forum Suggestions", content:"How can we improve the forum?", author:"Admin", category:"General"}
];

/* ===== RENDER ===== */
const container = document.getElementById("threadContainer");

function renderThreads(list){
  container.innerHTML="";
  list.forEach(thread=>{
    const div=document.createElement("div");
    div.classList.add("thread");
    div.innerHTML=`
      <h3>${thread.title}</h3>
      <p>${thread.content}</p>
      <div class="meta">
        <span>By ${thread.author}</span>
        <span>${thread.category}</span>
      </div>
    `;
    container.appendChild(div);
  });

  animateThreads();
}

/* ===== SEARCH & FILTER ===== */
function applyFilters(){
  const search=document.getElementById("searchInput").value.toLowerCase();
  const category=document.getElementById("categoryFilter").value;

  const filtered=threads.filter(t=>{
    return (
      (t.title.toLowerCase().includes(search) ||
       t.content.toLowerCase().includes(search)) &&
      (category==="All" || t.category===category)
    );
  });

  renderThreads(filtered);
}

document.getElementById("searchInput").addEventListener("input",applyFilters);
document.getElementById("categoryFilter").addEventListener("change",applyFilters);

/* ===== SCROLL NAV EFFECT ===== */
window.addEventListener("scroll",()=>{
  const navbar=document.getElementById("navbar");
  navbar.classList.toggle("scrolled",window.scrollY>50);
});

/* ===== SCROLL ANIMATION ===== */
function animateThreads(){
  const threads=document.querySelectorAll(".thread");
  const observer=new IntersectionObserver(entries=>{
    entries.forEach(entry=>{
      if(entry.isIntersecting){
        entry.target.classList.add("show");
      }
    });
  },{threshold:0.2});

  threads.forEach(t=>observer.observe(t));
}

renderThreads(threads);

</script>

</body>
</html>
