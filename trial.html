<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRODDEC | CEC</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* GLOBAL */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins', sans-serif;
}

html{ scroll-behavior:smooth; }

body{
  background:#000;
  color:#f5f5f5;
  overflow-x:hidden;
}

/* NAVBAR */
.navbar{
  position:fixed;
  width:100%;
  top:0;
  left:0;
  padding:15px 40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(0,0,0,0.95);
  backdrop-filter:blur(10px);
  z-index:1000;
  transition:0.4s ease;
}

.navbar.scrolled{
  padding:18px 40px;
  box-shadow:0 5px 20px rgba(230,3,3,0.4);
}

.logo{
  font-size:20px;
  font-weight:600;
  color:#c1121f;
}

/* NAV LINKS */
.nav-links{
  display:flex;
  gap:30px;
}

.nav-links a{
  text-decoration:none;
  color:#ccc;
  font-weight:500;
  position:relative;
  padding:5px 0;
  transition:0.3s ease;
}

.nav-links a:hover{ color:#fff; }

.nav-links a::after{
  content:"";
  position:absolute;
  left:0;
  bottom:-5px;
  width:0%;
  height:2px;
  background:#f10717;
  transition:0.4s ease;
}

.nav-links a:hover::after{ width:100%; }

/* HAMBURGER */
.menu-toggle{
  display:none;
  flex-direction:column;
  cursor:pointer;
  gap:5px;
}

.menu-toggle span{
  width:25px;
  height:3px;
  background:white;
  transition:0.3s;
}

/* HERO */
.hero{
  height:100vh;
  background:linear-gradient(135deg,#000,#140000);
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:0 20px;
  position:relative;
  overflow:hidden;
}

#heroCanvas{
  position:absolute;
  width:100%;
  height:100%;
  top:0;
  left:0;
}

.hero-content{
  max-width:800px;
  z-index:2;
  animation:fadeUp 1s ease forwards;
}

.hero h1{
  font-size:clamp(32px,6vw,48px);
  margin-bottom:20px;
}

.hero p{
  margin-bottom:30px;
  opacity:0.85;
}

.hero button{
  padding:12px 28px;
  border-radius:30px;
  border:1px solid #fff;
  background:transparent;
  color:white;
  cursor:pointer;
  transition:0.4s ease;
}

.hero button:hover{
  transform:translateY(-5px) scale(1.05);
}

/* SECTIONS */
.section{
  padding:100px 40px;
  max-width:1200px;
  margin:auto;
}

.section-title{
  text-align:center;
  margin-bottom:50px;
}

.section-title h2{
  font-size:28px;
  color:#d0cde7;
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:25px;
}

.card{
  background:#111;
  padding:25px;
  border-radius:15px;
  border:1px solid #1f1f1f;
  transition:0.4s;
  transform:translateY(40px);
  opacity:0;
}

.card.show{
  transform:translateY(0);
  opacity:1;
}

.card:hover{
  transform:translateY(-10px);
  border:1px solid #c1121f;
  box-shadow:0 20px 45px rgba(0,0,0,0.6);
}

.card h3{
  margin-bottom:10px;
  color:#e40707;
}

/* CONTACT */
.contact{
  text-align:center;
  padding:80px 20px;
}

.contact h2{
  margin-bottom:20px;
  color:#c1121f;
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  background:#050505;
  font-size:14px;
  border-top:1px solid #111;
}

/* ANIMATIONS */
@keyframes fadeUp{
  from{opacity:0; transform:translateY(30px);}
  to{opacity:1; transform:translateY(0);}
}

/* MOBILE RESPONSIVE */
@media(max-width:768px){

  .menu-toggle{
    display:flex;
  }

  .nav-links{
    position:fixed;
    right:-100%;
    top:70px;
    flex-direction:column;
    background:#000;
    width:220px;
    padding:30px;
    gap:20px;
    transition:0.4s;
    height:100vh;
  }

  .nav-links.active{
    right:0;
  }

  .section{
    padding:80px 20px;
  }

  .hero{
    padding-top:60px;
  }
}

</style>
</head>
<body>

<div class="navbar" id="navbar">
  <div class="logo">PRODDEC CEC</div>

  <div class="nav-links" id="navLinks">
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#projects">Projects</a>
    <a href="#events">Events</a>
    <a href="#contact">Contact</a>
  </div>

  <div class="menu-toggle" id="menuToggle">
    <span></span>
    <span></span>
    <span></span>
  </div>
</div>

<!-- KEEP YOUR SECTIONS SAME (NO CHANGE NEEDED) -->

<script>

/* NAVBAR SCROLL */
window.addEventListener("scroll",()=>{
  document.getElementById("navbar")
  .classList.toggle("scrolled",window.scrollY>50);
});

/* MOBILE MENU */
const menuToggle=document.getElementById("menuToggle");
const navLinks=document.getElementById("navLinks");

menuToggle.addEventListener("click",()=>{
  navLinks.classList.toggle("active");
});

/* CLOSE MENU ON LINK CLICK (MOBILE) */
document.querySelectorAll(".nav-links a").forEach(link=>{
  link.addEventListener("click",()=>{
    navLinks.classList.remove("active");
  });
});

</script>

</body>
</html>
